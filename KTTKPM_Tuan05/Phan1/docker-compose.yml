version: "3.9"

services:
  app:
    build: ./app
    container_name: node_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./app:/app
    command: node index.js

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_ui
    ports:
      - "8080:8080"

volumes:
  db_data: