# ==========================================
# CẤU HÌNH HỆ THỐNG CHUNG
# ==========================================
server.port=8084
spring.application.name=payment-service

# Cấu hình Kafka Broker 
# Khi test một mình: để localhost
# Khi ghép LAN: đổi localhost thành IP máy chạy Kafka (ví dụ 192.168.1.50)
spring.kafka.bootstrap-servers=localhost:9092

# ==========================================
# CẤU HÌNH CONSUMER (NHẬN EVENT)
# ==========================================
# Đổi Group ID mới để xóa "dớp" lỗi cũ kẹt trong Kafka
spring.kafka.consumer.group-id=payment-group-final-v1
spring.kafka.consumer.auto-offset-reset=latest

# Sử dụng ErrorHandlingDeserializer để App không bị sập khi nhận tin nhắn rác
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# CHIẾN THUẬT PACKAGE GIẢ DẠNG:
# Ép kiểu mặc định về class Booking trong package giống hệt người 4
# spring.kafka.consumer.properties.spring.json.value.default.type=com.example.paymentservice.model.Booking
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ==========================================
# CẤU HÌNH PRODUCER (GỬI EVENT)
# ==========================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer